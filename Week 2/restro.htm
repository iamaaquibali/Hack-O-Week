<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Royal Hotel - Menu</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: #ffffff;
        }
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .video-bg video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }
        header {
            text-align: center;
            padding: 30px 20px;
            background: rgba(139, 0, 0, 0.85);
        }

        header img {
            width: 180px;
            margin-bottom: 10px;
        }

        header h1 {
            margin: 5px 0;
            letter-spacing: 1px;
        }

        header p {
            margin: 0;
            font-size: 14px;
        }
        .menu {
            max-width: 900px;
            margin: 40px auto;
            padding: 30px;
            background: rgba(0, 0, 0, 0.65);
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 {
            color: #ffcccb;
            border-bottom: 2px solid #ffcccb;
            padding-bottom: 6px;
            margin-top: 30px;
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px dashed rgba(255,255,255,0.4);
            transition: background 0.3s;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.1);
            padding-left: 8px;
        }

        .menu-item span {
            font-weight: bold;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: rgba(139, 0, 0, 0.85);
            margin-top: 40px;
            font-size: 14px;
        }
        @media (max-width: 600px) {
            .menu {
                margin: 20px;
                padding: 20px;
            }

            header img {
                width: 140px;
            }
        }
    </style>
</head>

<body>
<div class="video-bg">
    <video autoplay muted loop playsinline>
        <source src="bgvideoo.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>
</div>

<header>
    <img src="logo.png" alt="Royal Spice Hotel Logo">
    <h1>The Royal Hotel</h1>
    <p>Delicious Food • Great Ambience</p>
</header>

<div class="menu">

    <h2>Starters</h2>
    <div class="menu-item">
        <span>Vegetable Soup</span>
        <span>₹120</span>
    </div>
    <div class="menu-item">
        <span>Paneer Tikka</span>
        <span>₹220</span>
    </div>
    <div class="menu-item">
        <span>Chicken Pakora</span>
        <span>₹250</span>
    </div>

    <h2>Main Course</h2>
    <div class="menu-item">
        <span>Paneer Butter Masala</span>
        <span>₹280</span>
    </div>
    <div class="menu-item">
        <span>Chicken Biryani</span>
        <span>₹320</span>
    </div>
    <div class="menu-item">
        <span>Butter Naan</span>
        <span>₹40</span>
    </div>

    <h2>Desserts</h2>
    <div class="menu-item">
        <span>Gulab Jamun</span>
        <span>₹90</span>
    </div>
    <div class="menu-item">
        <span>Ice Cream</span>
        <span>₹110</span>
    </div>

</div>

<footer>
    © 2026 The Royal Hotel | Contact: 9876543210
</footer>

</body>
</html>
